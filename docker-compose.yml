version: '3.0'

services:
  main:
    container_name: poll-bot
    platform: linux/amd64
    build:
      context: .
    environment:
      - NODE_OPTIONS=--dns-result-order=verbatim
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - 5001:5001
    command: npm run start
    depends_on:
      - mongodb
    restart: always
  mongodb:
    image: mongo:5.0.2
    # command: [--auth]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb:/data/db
volumes:
  mongodb:
